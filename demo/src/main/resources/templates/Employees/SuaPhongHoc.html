<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Chỉnh Sửa Phòng Học</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<h2 class="text-center mb-4">Chỉnh Sửa Phòng Học</h2>

<form th:action="@{/SuaPhongHoc}" method="post" class="border p-4">
  <div class="mb-3">
    <label for="roomId" class="form-label">ID Phòng</label>
    <input type="text" id="roomId" name="roomId" class="form-control" th:value="${room.roomId}" readonly>
  </div>

  <div class="mb-3">
    <label for="roomName" class="form-label">Tên Phòng</label>
    <input type="text" id="roomName" name="roomName" class="form-control" th:value="${room.roomName}" required>
  </div>

  <div class="mb-3">
    <label for="roomType" class="form-label">Loại Phòng</label>
    <select id="roomType" name="roomTypeId" class="form-select">
      <option th:each="type : ${roomTypes}"
              th:value="${type.roomTypeId}"
              th:text="${type.roomTypeName}"
              th:selected="${room.roomTypeID != null and type.roomTypeId == room.roomTypeID.roomTypeId}">
      </option>
    </select>
  </div>

  <button type="submit" class="btn btn-primary">Cập Nhật</button>
  <a th:href="@{/DanhSachPhongHoc}" class="btn btn-secondary">Hủy</a>
</form>

</body>
</html>
