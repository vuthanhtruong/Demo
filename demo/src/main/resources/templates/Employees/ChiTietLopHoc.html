<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Chi Tiết Lớp Học</title>
  <link rel="stylesheet" th:href="@{/Employees/ChiTietLopHoc.css}">
</head>
<body>
<h2>Chi Tiết Lớp Học</h2>
<a href="/BoTriLopHoc" class="btn-back">Quay lại</a>

<div class="container">

  <!-- Cột 1: Thêm Giáo Viên & Học Sinh -->
  <div class="section">
    <h3>Thêm Giáo Viên & Học Sinh</h3>

    <form action="#" th:action="@{/ThemGiaoVienVaoLop}" method="post">
      <input type="hidden" name="roomId" th:value="${room.roomId}" />
      <label>Chọn Giáo Viên:</label>
      <div th:each="teacher : ${teachers}">
        <input type="checkbox" name="teacherIds" th:value="${teacher.teacherID}" />
        <span th:text="${teacher.firstName + ' ' + teacher.lastName}"></span>
      </div>
      <button type="submit">Thêm Giáo Viên</button>
    </form>

    <form action="#" th:action="@{/ThemHocSinhVaoLop}" method="post">
      <input type="hidden" name="roomId" th:value="${room.roomId}" />
      <label>Chọn Học Sinh:</label>
      <div th:each="student : ${students}">
        <input type="checkbox" name="studentIds" th:value="${student.studentID}" />
        <span th:text="${student.firstName + ' ' + student.lastName}"></span>
      </div>
      <button type="submit">Thêm Học Sinh</button>
    </form>
  </div>

  <!-- Cột 2: Danh Sách Giáo Viên -->
  <div class="section">
    <h3>Danh Sách Giáo Viên</h3>
    <ul>
      <li th:each="teacher : ${uniqueTeachers}">
        <span th:text="${teacher.firstName + ' ' + teacher.lastName}"></span>
        <a th:href="@{/XoaGiaoVienTrongLop(teacherId=${teacher.teacherID}, roomId=${room.roomId})}" class="btn-delete">[Xóa]</a>
      </li>
    </ul>
  </div>

  <!-- Cột 3: Danh Sách Học Sinh -->
  <div class="section">
    <h3>Danh Sách Học Sinh</h3>
    <ul>
      <li th:each="student : ${uniqueStudents}">
        <span th:text="${student.firstName + ' ' + student.lastName}"></span>
        <a th:href="@{/XoaHocSinhTrongLop(studentId=${student.studentID}, roomId=${room.roomId})}" class="btn-delete">[Xóa]</a>
      </li>
    </ul>
  </div>

</div>
</body>
</html>
