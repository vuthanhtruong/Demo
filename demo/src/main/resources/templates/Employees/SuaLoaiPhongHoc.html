<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Chỉnh Sửa Loại Phòng Học</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" th:href="@{/SuaLoaiPhongHoc.css}">
</head>
<body class="container mt-4">

<h2 class="text-center mb-4"><i class="fas fa-edit"></i> Chỉnh Sửa Loại Phòng Học</h2>

<form th:action="@{/SuaLoaiPhongHoc}" method="post" class="border p-4">
  <div class="mb-3">
    <label for="roomTypeId" class="form-label"><i class="fas fa-hashtag"></i> ID Loại Phòng</label>
    <input type="text" id="roomTypeId" name="roomTypeId" class="form-control" th:value="${roomType.roomTypeId}" readonly>
  </div>

  <div class="mb-3">
    <label for="roomTypeName" class="form-label"><i class="fas fa-door-open"></i> Tên Loại Phòng</label>
    <input type="text" id="roomTypeName" name="roomTypeName" class="form-control" th:value="${roomType.roomTypeName}" required>
  </div>

  <div class="mb-3">
    <label for="employeeId" class="form-label"><i class="fas fa-user"></i> Nhân Viên Tạo</label>
    <input type="text" id="employeeId" name="employeeId" class="form-control"
           th:value="${roomType.EmployeeID.firstName + ' ' + roomType.EmployeeID.lastName}" readonly>
  </div>

  <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Cập Nhật</button>
  <a th:href="@{/ThemLoaiPhongHoc}" class="btn btn-secondary"><i class="fas fa-times"></i> Hủy</a>
</form>

</body>
</html>
