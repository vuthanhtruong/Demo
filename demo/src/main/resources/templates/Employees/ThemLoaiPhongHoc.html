<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Loại Phòng Học</title>
    <link rel="stylesheet" th:href="@{/ThemLoaiPhongHoc.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<h2 class="text-center mb-4">Thêm Loại Phòng Học</h2>

<!-- Form Thêm Loại Phòng Học -->
<form th:action="@{/ThemLoaiPhongHoc}" method="post" class="mb-4">
    <div class="mb-3">
        <label for="roomTypeId" class="form-label">Mã Loại Phòng</label>
        <input type="number" id="roomTypeId" name="roomTypeId" class="form-control" required>
    </div>

    <div class="mb-3">
        <label for="roomTypeName" class="form-label">Tên Loại Phòng</label>
        <input type="text" id="roomTypeName" name="roomTypeName" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">Thêm Loại Phòng</button>
    <a th:href="@{/DanhSachPhongHoc}" class="btn btn-secondary">Quay Lại</a>
</form>

<!-- Danh sách loại phòng -->
<h3 class="mb-3">Danh Sách Loại Phòng</h3>
<table class="table table-striped">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Tên Loại Phòng</th>
        <th>Nhân Viên Tạo</th>
        <th>Thao Tác</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="roomType : ${rooms}">
        <td th:text="${roomType.roomTypeId}"></td>
        <td th:text="${roomType.roomTypeName}"></td>
        <td th:text="${roomType.employeeID.firstName + ' ' + roomType.employeeID.lastName}"></td>
        <td>
            <a th:href="@{/SuaLoaiPhongHoc/{id}(id=${roomType.roomTypeId})}" class="btn btn-warning btn-sm">Sửa</a>
            <a th:href="@{/XoaLoaiPhongHoc/{id}(id=${roomType.roomTypeId})}" class="btn btn-danger btn-sm"
               onclick="return confirm('Bạn có chắc chắn muốn xóa?');">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
