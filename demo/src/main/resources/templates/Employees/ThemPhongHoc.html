<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Thêm Phòng Học</title>
  <link rel="stylesheet" type="text/css" href="/ThemPhongHoc.css">
</head>
<body>
<h2>Thêm Phòng Học</h2>

<form action="/ThemPhongHoc" method="post">
  <label for="roomId">ID Phòng:</label>
  <input type="number" id="roomId" name="roomId" required><br>

  <label for="roomName">Tên Phòng:</label>
  <input type="text" id="roomName" name="roomName" required><br>

  <label for="roomTypeId">Loại Phòng:</label>
  <select id="roomTypeId" name="roomTypeId" required>
    <option th:each="type : ${roomTypes}"
            th:value="${type.roomTypeId}"
            th:text="${type.roomTypeName}">
    </option>
  </select><br>

  <button type="submit">Thêm Phòng Học</button>
  <a href="/DanhSachPhongHoc">Quay Lại</a>
</form>

<p th:if="${param.error}" style="color:red;">Loại phòng không hợp lệ.</p>
</body>
</html>
