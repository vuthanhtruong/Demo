<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Chỉnh sửa nhân viên</title>
  <link rel="stylesheet" href="/Admin/SuaNhanVien.css">
</head>
<body>
<h2>Chỉnh sửa thông tin nhân viên</h2>
<form th:action="@{/SuaNhanVien/{id}(id=${employees.EmployeeID})}" method="post">
  <label for="firstName">Họ:</label>
  <input type="text" id="firstName" name="firstName" th:value="${employees.FirstName}" required>
  <br>

  <label for="lastName">Tên:</label>
  <input type="text" id="lastName" name="lastName" th:value="${employees.LastName}" required>
  <br>

  <label for="email">Email:</label>
  <input type="email" id="email" name="email" th:value="${employees.Email}" required>
  <br>

  <label for="phoneNumber">Số điện thoại:</label>
  <input type="text" id="phoneNumber" name="phoneNumber" th:value="${employees.PhoneNumber}" required>
  <br>

  <label for="password">Mật khẩu:</label>
  <input type="password" id="password" name="password" required>
  <br>

  <button type="submit">Lưu</button>
</form>
<br>
<a href="/DanhSachNhanVien">Quay lại danh sách nhân viên</a>
</body>
</html>
